<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆清单 - 记账记事本</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --gray: #9ca3af;
      --light: #374151;
      --white: #1f2937;
      --bg: #111827;
      --card-bg: #1f2937;
      --text: #f3f4f6;
      --text-secondary: #9ca3af;
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
      --border: #374151;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      min-height: 100vh;
      color: var(--text);
    }

    .app-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      color: white;
      padding: 20px 0;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .nav-tab {
      flex: 1;
      min-width: 100px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 12px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .nav-tab.active {
      background: var(--card-bg);
      color: var(--primary);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.3s;
      background: var(--bg);
      color: var(--text);
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .type-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .type-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .type-btn.active {
      border-color: var(--primary);
      background: rgba(102, 126, 234, 0.2);
      color: var(--primary);
    }

    .type-btn.income.active {
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .tags-input {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      min-height: 44px;
      background: var(--bg);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--border);
      border-radius: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .tag-tag {
      background: rgba(102, 126, 234, 0.3);
      color: #a5b4fc;
    }

    .tag-remove {
      cursor: pointer;
      color: var(--text-secondary);
    }

    .timeline-item {
      position: relative;
      padding-left: 30px;
      margin-bottom: 20px;
    }

    .timeline-dot {
      position: absolute;
      left: 0;
      top: 0;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
    }

    .timeline-date {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .record-card {
      background: var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-top: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .record-card:hover {
      background: #4b5563;
    }

    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .record-amount {
      font-size: 18px;
      font-weight: 600;
    }

    .record-amount.completed {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .record-amount.expense {
      color: var(--danger);
    }

    .record-amount.income {
      color: var(--success);
    }

    .record-category {
      background: rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      color: #a5b4fc;
    }

    .record-category.completed {
      opacity: 0.5;
    }

    .note-type {
      color: var(--success) !important;
      font-size: 16px;
    }

    .note-type.completed {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .note-item {
      border-left: 3px solid var(--success);
    }

    .record-meta {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .record-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .record-note {
      font-size: 13px;
      color: var(--text);
      margin-top: 8px;
      padding: 8px;
      background: var(--bg);
      border-radius: 8px;
    }

    .day-total {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      color: white;
      margin-bottom: 12px;
    }

    .day-total-income {
      color: #86efac;
    }

    .day-total-expense {
      color: #fca5a5;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
    }

    .stat-value.income {
      color: var(--success);
    }

    .stat-value.expense {
      color: var(--danger);
    }

    .stat-value.balance {
      color: var(--primary);
    }

    .chart-container {
      height: 250px;
      margin-bottom: 20px;
    }

    .budget-box {
      background: rgba(245, 158, 11, 0.2);
      border: 1px solid var(--warning);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .budget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .budget-progress {
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }

    .budget-bar {
      height: 100%;
      background: var(--warning);
      transition: width 0.3s;
    }

    .budget-bar.over {
      background: var(--danger);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .calendar-header {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      color: var(--text);
    }

    .calendar-day:hover {
      background: var(--border);
    }

    .calendar-day.has-data {
      background: rgba(102, 126, 234, 0.3);
    }

    .calendar-day.today {
      border: 2px solid var(--primary);
    }

    .calendar-day .amount {
      font-size: 10px;
      color: var(--danger);
      margin-top: 2px;
    }

    .calendar-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .calendar-nav button {
      padding: 8px 16px;
      border: none;
      background: var(--border);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
    }

    .note-card {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-top: 10px;
      border-left: 4px solid var(--success);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .record-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .record-card {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>📝 记忆清单</h1>
      <p>每一笔支出都是一段生活记忆</p>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('timeline')">时间轴</button>
      <button class="nav-tab" onclick="showPage('add')">记账</button>
      <button class="nav-tab" onclick="showPage('note')">记事</button>
      <button class="nav-tab" onclick="showPage('stats')">统计</button>
      <button class="nav-tab" onclick="showPage('calendar')">日历</button>
    </div>

    <!-- 时间轴页面 -->
    <div id="timeline" class="page active">
      <div id="timeline-content"></div>
    </div>

    <!-- 记账页面 -->
    <div id="add" class="page">
      <div class="card">
        <div class="card-title">📝 记录一笔</div>
        <div class="type-toggle">
          <button class="type-btn expense active" onclick="setType('expense')">支出</button>
          <button class="type-btn income" onclick="setType('income')">收入</button>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">金额</label>
            <input type="number" class="form-input" id="amount" placeholder="0.00" step="0.01">
          </div>
          <div class="form-group">
            <label class="form-label">账户</label>
            <select class="form-select" id="account">
              <option value="现金">现金</option>
              <option value="微信">微信</option>
              <option value="支付宝">支付宝</option>
              <option value="银行卡">银行卡</option>
              <option value="信用卡">信用卡</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">分类</label>
          <select class="form-select" id="category">
            <optgroup label="支出">
              <option value="餐饮">餐饮</option>
              <option value="交通">交通</option>
              <option value="购物">购物</option>
              <option value="娱乐">娱乐</option>
              <option value="居住">居住</option>
              <option value="医疗">医疗</option>
              <option value="学习">学习</option>
              <option value="人情">人情</option>
              <option value="其他">其他</option>
            </optgroup>
            <optgroup label="收入">
              <option value="工资">工资</option>
              <option value="奖金">奖金</option>
              <option value="副业">副业</option>
              <option value="理财">理财</option>
              <option value="红包">红包</option>
              <option value="其他">其他</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">时间</label>
          <input type="datetime-local" class="form-input" id="record-time">
        </div>
        <div class="form-group">
          <label class="form-label">记忆备注（记录当时场景、心情）</label>
          <textarea class="form-textarea" id="record-note" placeholder="例如：和老妈第一次吃这家火锅，她很喜欢..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">标签</label>
          <div class="tags-input" id="tags-container">
            <span class="tag tag-tag" onclick="removeTag(this)">#聚餐</span>
            <span class="tag tag-tag" onclick="removeTag(this)">#旅行</span>
            <span class="tag tag-tag" onclick="removeTag(this)">#生日</span>
          </div>
          <input type="text" class="form-input" id="tag-input" placeholder="输入标签按回车添加" style="margin-top: 8px;">
        </div>
        <button class="btn btn-primary" onclick="saveRecord()">保存记录</button>
      </div>
    </div>

    <!-- 记事页面 -->
    <div id="note" class="page">
      <div class="card">
        <div class="card-title">💭 记录生活</div>
        <div class="form-group">
          <label class="form-label">标题</label>
          <input type="text" class="form-input" id="note-title" placeholder="今日心情、待办、灵感...">
        </div>
        <div class="form-group">
          <label class="form-label">内容</label>
          <textarea class="form-textarea" id="note-content" placeholder="记录今天的点滴..." style="min-height: 150px;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">标签</label>
          <input type="text" class="form-input" id="note-tags" placeholder="多个标签用逗号分隔，如：#工作,#学习">
        </div>
        <button class="btn btn-primary" onclick="saveNote()">保存记事</button>
      </div>
      <div class="card">
        <div class="card-title">📋 我的记事</div>
        <div id="notes-list"></div>
      </div>
    </div>

    <!-- 统计页面 -->
    <div id="stats" class="page">
      <div class="card">
        <div class="card-title">📊 本月概览</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">收入</div>
            <div class="stat-value income" id="month-income">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">支出</div>
            <div class="stat-value expense" id="month-expense">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">结余</div>
            <div class="stat-value balance" id="month-balance">0</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">💰 预算设置</div>
        <div class="form-group">
          <label class="form-label">本月预算（元）</label>
          <input type="number" class="form-input" id="budget-input" placeholder="设置预算">
        </div>
        <button class="btn btn-primary" onclick="setBudget()">保存预算</button>
        <div class="budget-box" id="budget-display" style="display: none; margin-top: 12px;">
          <div class="budget-header">
            <span>本月支出 <span id="budget-spent">0</span> / <span id="budget-total">0</span></span>
            <span id="budget-percent">0%</span>
          </div>
          <div class="budget-progress">
            <div class="budget-bar" id="budget-bar" style="width: 0%"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📈 支出分类</div>
        <div class="chart-container">
          <canvas id="category-chart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📉 近7天趋势</div>
        <div class="chart-container">
          <canvas id="trend-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- 日历页面 -->
    <div id="calendar" class="page">
      <div class="card">
        <div class="calendar-nav">
          <button onclick="prevMonth()">◀ 上月</button>
          <span id="calendar-title">2024年1月</span>
          <button onclick="nextMonth()">下月 ▶</button>
        </div>
        <div class="calendar-grid">
          <div class="calendar-header">日</div>
          <div class="calendar-header">一</div>
          <div class="calendar-header">二</div>
          <div class="calendar-header">三</div>
          <div class="calendar-header">四</div>
          <div class="calendar-header">五</div>
          <div class="calendar-header">六</div>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
      </div>
      <div class="card" id="day-records" style="display: none;">
        <div class="card-title" id="day-title">2024年1月1日</div>
        <div id="day-records-list"></div>
      </div>
    </div>
  </div>

  <script>
    const CATEGORIES = {
      expense: ['餐饮', '交通', '购物', '娱乐', '居住', '医疗', '学习', '人情', '其他'],
      income: ['工资', '奖金', '副业', '理财', '红包', '其他']
    };
    const ACCOUNTS = ['现金', '微信', '支付宝', '银行卡', '信用卡'];

    let records = [];
    let notes = [];
    let budget = 0;
    let currentType = 'expense';
    let currentMonth = new Date();
    let categoryChart = null;
    let trendChart = null;

    function loadData() {
      try {
        records = JSON.parse(localStorage.getItem('memory-records')) || [];
        notes = JSON.parse(localStorage.getItem('memory-notes')) || [];
        budget = parseFloat(localStorage.getItem('memory-budget')) || 0;
      } catch (e) {
        console.error('加载数据失败:', e);
        records = [];
        notes = [];
        budget = 0;
      }
    }

    loadData();

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatTime(date) {
      const hours = date.getHours();
      const minutes = date.getMinutes().toString().padStart(2, '0');
      const prefix = hours < 12 ? '上午' : '下午';
      const displayHours = hours > 12 ? hours - 12 : (hours === 0 ? 12 : hours);
      return `${prefix} ${displayHours}:${minutes}`;
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat('zh-CN', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        weekday: 'long'
      }).format(date);
    }

    function safeJoin(arr, separator = '') {
      if (!Array.isArray(arr)) return '';
      return arr.map(t => `<span class="tag tag-tag">${escapeHtml(t)}</span>`).join(separator);
    }

    function saveData(key, data) {
      try {
        localStorage.setItem(key, JSON.stringify(data));
      } catch (e) {
        console.error('保存数据失败:', e);
        alert('数据保存失败，请检查存储空间');
      }
    }

    function init() {
      document.getElementById('record-time').value = new Date().toISOString().slice(0, 16);
      document.getElementById('budget-input').value = budget || '';
      renderTimeline();
      renderNotes();
      renderStats();
      renderCalendar();
      setupTagInput();
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      if (event && event.target) event.target.classList.add('active');
      if (pageId === 'stats') renderStats();
      if (pageId === 'calendar') renderCalendar();
      if (pageId === 'note') renderNotes();
      if (pageId === 'timeline') renderTimeline();
    }

    function setType(type) {
      currentType = type;
      document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.type-btn.${type}`).classList.add('active');
      const category = document.getElementById('category');
      category.innerHTML = CATEGORIES[type].map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function saveRecord() {
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;
      const account = document.getElementById('account').value;
      const time = document.getElementById('record-time').value || new Date().toISOString();
      const recordNote = document.getElementById('record-note').value;
      const tags = Array.from(document.querySelectorAll('#tags-container .tag-tag')).map(t => t.textContent);

      if (!amount || amount <= 0) {
        alert('请输入有效金额');
        return;
      }

      const record = {
        id: Date.now(),
        type: currentType,
        amount: currentType === 'expense' ? -amount : amount,
        category: escapeHtml(category),
        account: escapeHtml(account),
        time,
        recordNote: escapeHtml(recordNote),
        tags: Array.isArray(tags) ? tags : [],
        completed: false
      };

      records.push(record);
      saveData('memory-records', records);

      document.getElementById('amount').value = '';
      document.getElementById('record-note').value = '';
      alert('记录已保存！');
      renderTimeline();
    }

    function renderTimeline() {
      const container = document.getElementById('timeline-content');
      
      const allItems = [
        ...records.map(r => ({ ...r, itemType: 'record' })),
        ...notes.map(n => ({ ...n, itemType: 'note', amount: 0, category: '记事', account: '' }))
      ];
      
      if (allItems.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无记录，开始记账吧！</div>';
        return;
      }

      // 按时间倒序排列
      allItems.sort((a, b) => new Date(b.time) - new Date(a.time));

      const grouped = {};
      allItems.forEach(item => {
        const date = item.time.split('T')[0];
        if (!grouped[date]) grouped[date] = { income: 0, expense: 0, items: [] };
        if (item.itemType === 'record') {
          if (item.amount > 0) grouped[date].income += item.amount;
          else grouped[date].expense += Math.abs(item.amount);
        }
        grouped[date].items.push(item);
      });

      let html = '';
      for (const [date, data] of Object.entries(grouped)) {
        const dateObj = new Date(date);
        const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const dateStr = `${dateObj.getMonth() + 1}月${dateObj.getDate()}日 ${weekDays[dateObj.getDay()]}`;

        html += `<div class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-date">${dateStr}</div>
          <div class="day-total">
            <span class="day-total-income">收入 ${data.income.toFixed(2)}</span>
            <span class="day-total-expense">支出 ${data.expense.toFixed(2)}</span>
          </div>`;

        data.items.forEach(item => {
          if (item.itemType === 'record') {
            const time = item.time && item.time.split('T')[1] ? formatTime(new Date(item.time)) : '';
            const tagsHtml = safeJoin(item.tags, '');
            const noteHtml = item.recordNote ? `<div class="record-note">${escapeHtml(item.recordNote)}</div>` : '';
            const completedClass = item.completed ? 'completed' : '';
            const completedText = item.completed ? '(已完成)' : '';

            html += `<div class="record-card" onclick="toggleComplete(${item.id})">
              <div class="record-header">
                <span class="record-amount ${item.type} ${completedClass}">${item.type === 'expense' ? '-' : '+'}${Math.abs(item.amount).toFixed(2)}${completedText}</span>
                <span class="record-category ${completedClass}">${escapeHtml(item.category)}</span>
              </div>
              <div class="record-meta">
                <span>${escapeHtml(time)}</span>
                <span>${escapeHtml(item.account)}</span>
              </div>
              <div class="record-tags">${tagsHtml}</div>
              ${noteHtml}
              <div class="record-actions">
                <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteRecord(${item.id})">删除</button>
              </div>
            </div>`;
          } else {
            const time = item.time ? formatTime(new Date(item.time)) : '';
            const tagsHtml = safeJoin(item.tags, '');
            const completedClass = item.completed ? 'completed' : '';
            const completedText = item.completed ? '(已完成)' : '';

            html += `<div class="record-card note-item" onclick="toggleNoteComplete(${item.id})">
              <div class="record-header">
                <span class="record-amount note-type ${completedClass}">📝 ${escapeHtml(item.title)}${completedText}</span>
              </div>
              <div class="record-meta">
                <span>${escapeHtml(time)}</span>
              </div>
              <div class="record-note">${escapeHtml(item.content)}</div>
              <div class="record-tags">${tagsHtml}</div>
              <div class="record-actions">
                <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteNote(${item.id})">删除</button>
              </div>
            </div>`;
          }
        });

        html += '</div>';
      }

      container.innerHTML = html;
    }

    function deleteRecord(id) {
      if (confirm('确定删除这条记录吗？')) {
        records = records.filter(r => r.id !== id);
        saveData('memory-records', records);
        renderTimeline();
        renderStats();
        renderCalendar();
      }
    }

    function toggleComplete(id) {
      const record = records.find(r => r.id === id);
      if (record) {
        record.completed = !record.completed;
        saveData('memory-records', records);
        renderTimeline();
      }
    }

    function toggleCompleteCommon(type, id) {
      if (type === 'record') {
        toggleComplete(id);
      } else {
        toggleNoteComplete(id);
      }
    }

    function setupTagInput() {
      document.getElementById('tag-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && this.value.trim()) {
          const tag = '#' + this.value.trim().replace(/^#/, '');
          addTag(tag);
          this.value = '';
        }
      });
    }

    function addTag(tag) {
      const container = document.getElementById('tags-container');
      if (!container.querySelector(`.tag-tag:contains(${tag})`)) {
        const span = document.createElement('span');
        span.className = 'tag tag-tag';
        span.textContent = tag;
        span.onclick = function() { removeTag(this); };
        container.appendChild(span);
      }
    }

    function removeTag(el) {
      el.remove();
    }

    function saveNote() {
      const title = document.getElementById('note-title').value.trim();
      const content = document.getElementById('note-content').value.trim();
      const tagsStr = document.getElementById('note-tags').value;
      const tags = Array.isArray(tagsStr) ? tagsStr : tagsStr.split(',').map(t => t.trim()).filter(t => t).map(t => '#' + t.replace(/^#/, ''));

      if (!title || !content) {
        alert('请填写标题和内容');
        return;
      }

      const note = {
        id: Date.now(),
        title: escapeHtml(title),
        content: escapeHtml(content),
        tags: Array.isArray(tags) ? tags : [],
        time: new Date().toISOString(),
        completed: false
      };

      notes.push(note);
      saveData('memory-notes', notes);

      document.getElementById('note-title').value = '';
      document.getElementById('note-content').value = '';
      document.getElementById('note-tags').value = '';
      alert('记事已保存！');
      renderNotes();
      renderTimeline();
    }

    function renderNotes() {
      const container = document.getElementById('notes-list');
      if (!notes || notes.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无记事</div>';
        return;
      }

      notes.sort((a, b) => new Date(b.time) - new Date(a.time));
      let html = '';
      notes.forEach(n => {
        const time = n.time ? new Date(n.time).toLocaleString('zh-CN') : '';
        const tagsHtml = safeJoin(n.tags, '');
        const completedStyle = n.completed ? 'text-decoration: line-through; opacity: 0.5;' : '';
        
        html += `<div class="note-card" onclick="toggleNoteComplete(${n.id})">
          <div style="font-weight: 600; margin-bottom: 8px; ${completedStyle}">${escapeHtml(n.title)}</div>
          <div style="color: var(--text-secondary); margin-bottom: 8px;">${escapeHtml(n.content)}</div>
          <div class="record-tags">${tagsHtml}</div>
          <div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">${escapeHtml(time)}</div>
          <div class="record-actions">
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteNote(${n.id})">删除</button>
          </div>
        </div>`;
      });
      container.innerHTML = html;
    }

    function deleteNote(id) {
      if (confirm('确定删除这条记事吗？')) {
        notes = notes.filter(n => n.id !== id);
        saveData('memory-notes', notes);
        renderNotes();
        renderTimeline();
      }
    }

    function toggleNoteComplete(id) {
      const note = notes.find(n => n.id === id);
      if (note) {
        note.completed = !note.completed;
        saveData('memory-notes', notes);
        renderNotes();
        renderTimeline();
      }
    }

    function renderStats() {
      const now = new Date();
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const monthRecords = records.filter(r => new Date(r.time) >= monthStart);

      const income = monthRecords.filter(r => r.amount > 0).reduce((s, r) => s + r.amount, 0);
      const expense = monthRecords.filter(r => r.amount < 0).reduce((s, r) => s + Math.abs(r.amount), 0);

      document.getElementById('month-income').textContent = income.toFixed(2);
      document.getElementById('month-expense').textContent = expense.toFixed(2);
      document.getElementById('month-balance').textContent = (income - expense).toFixed(2);

      if (budget > 0) {
        document.getElementById('budget-display').style.display = 'block';
        document.getElementById('budget-spent').textContent = expense.toFixed(2);
        document.getElementById('budget-total').textContent = budget.toFixed(2);
        const percent = Math.min((expense / budget * 100).toFixed(0), 100);
        document.getElementById('budget-percent').textContent = percent + '%';
        const bar = document.getElementById('budget-bar');
        bar.style.width = percent + '%';
        bar.className = 'budget-bar' + (expense > budget ? ' over' : '');
      }

      const categoryData = {};
      monthRecords.filter(r => r.amount < 0).forEach(r => {
        categoryData[r.category] = (categoryData[r.category] || 0) + Math.abs(r.amount);
      });

      if (categoryChart) categoryChart.destroy();
      const ctx1 = document.getElementById('category-chart').getContext('2d');
      categoryChart = new Chart(ctx1, {
        type: 'doughnut',
        data: {
          labels: Object.keys(categoryData),
          datasets: [{
            data: Object.values(categoryData),
            backgroundColor: ['#667eea', '#764ba2', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#6b7280']
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

      const last7Days = {};
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toISOString().split('T')[0];
        last7Days[key] = { income: 0, expense: 0 };
      }

      monthRecords.forEach(r => {
        const key = r.time.split('T')[0];
        if (last7Days[key]) {
          if (r.amount > 0) last7Days[key].income += r.amount;
          else last7Days[key].expense += Math.abs(r.amount);
        }
      });

      if (trendChart) trendChart.destroy();
      const ctx2 = document.getElementById('trend-chart').getContext('2d');
      trendChart = new Chart(ctx2, {
        type: 'line',
        data: {
          labels: Object.keys(last7Days).map(k => k.slice(5)),
          datasets: [{
            label: '支出',
            data: Object.values(last7Days).map(d => d.expense),
            borderColor: '#ef4444',
            fill: false
          }, {
            label: '收入',
            data: Object.values(last7Days).map(d => d.income),
            borderColor: '#10b981',
            fill: false
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    function setBudget() {
      budget = parseFloat(document.getElementById('budget-input').value) || 0;
      saveData('memory-budget', budget);
      renderStats();
      alert('预算已设置！');
    }

    function renderCalendar() {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      document.getElementById('calendar-title').textContent = `${year}年${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date().toISOString().split('T')[0];

      const dayData = {};
      records.forEach(r => {
        const key = r.time.split('T')[0];
        if (!dayData[key]) dayData[key] = 0;
        if (r.amount < 0) dayData[key] += Math.abs(r.amount);
      });

      let html = '';
      for (let i = 0; i < firstDay; i++) {
        html += '<div></div>';
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const date = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const hasData = dayData[date] ? true : false;
        const isToday = date === today;
        const amount = dayData[date] ? dayData[date].toFixed(0) : '';

        html += `<div class="calendar-day ${hasData ? 'has-data' : ''} ${isToday ? 'today' : ''}" onclick="showDayRecords('${date}')">
          <span>${d}</span>
          ${amount ? `<span class="amount">${amount}</span>` : ''}
        </div>`;
      }

      document.getElementById('calendar-days').innerHTML = html;
    }

    function prevMonth() {
      currentMonth.setMonth(currentMonth.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentMonth.setMonth(currentMonth.getMonth() + 1);
      renderCalendar();
    }

    function showDayRecords(date) {
      const dayRecords = records.filter(r => r.time.split('T')[0] === date);
      document.getElementById('day-records').style.display = 'block';
      document.getElementById('day-title').textContent = new Date(date).toLocaleDateString('zh-CN');

      if (dayRecords.length === 0) {
        document.getElementById('day-records-list').innerHTML = '<div class="empty-state">当天无记录</div>';
        return;
      }

      let html = '';
      dayRecords.forEach(r => {
        const time = r.time ? formatTime(new Date(r.time)) : '';
        html += `<div class="record-card">
          <div class="record-header">
            <span class="record-amount ${r.type}">${r.type === 'expense' ? '-' : '+'}${Math.abs(r.amount).toFixed(2)}</span>
            <span class="record-category">${escapeHtml(r.category)}</span>
          </div>
          <div class="record-meta"><span>${escapeHtml(time)}</span><span>${escapeHtml(r.account)}</span></div>
          ${r.recordNote ? `<div class="record-note">${escapeHtml(r.recordNote)}</div>` : ''}
        </div>`;
      });
      document.getElementById('day-records-list').innerHTML = html;
    }

    init();
  </script>
</body>
</html>
