<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人名片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #87CEEB;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.8s ease-out;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #ccc;
      margin: 0 auto 24px;
    }

    .name {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      margin-bottom: 12px;
    }

    .bio {
      font-size: 16px;
      color: #666;
      margin-bottom: 24px;
    }

    .like-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .like-btn:hover {
      background: #ff5252;
      transform: scale(1.05);
    }

    .like-count {
      margin-top: 12px;
      color: #888;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar"></div>
    <div class="name">你的名字</div>
    <div class="bio">在学习用 AI 写代码的新手</div>
    <button class="like-btn" onclick="addLike()">点赞</button>
    <div class="like-count"><span id="count">0</span> 人赞过</div>
  </div>

  <script>
    let count = 0;
    function addLike() {
      count++;
      document.getElementById('count').textContent = count;
    }
  </script>
</body>
</html>
